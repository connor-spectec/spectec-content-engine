name: Generate Content Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'assets/asset-register.md'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate manifest
        run: python3 .github/scripts/generate_manifest.py

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-manifest.json
          git diff --cached --quiet || git commit -m "chore: regenerate content-manifest.json [skip ci]"
          git push
